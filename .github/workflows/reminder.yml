name: 微信定时提醒

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      test:
        description: '测试模式'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  check-reminders:
    runs-on: ubuntu-latest
    name: 检查并发送提醒
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests PyYAML

      - name: Send reminders
        env:
          # Cloudflare Worker 代理（推荐，解决IP白名单问题）
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_TOKEN: ${{ secrets.WORKER_TOKEN }}
          # 企业微信直接调用（需要服务器固定IP）
          WECOM_CORPID: ${{ secrets.WECOM_CORPID }}
          WECOM_CORPSECRET: ${{ secrets.WECOM_CORPSECRET }}
          WECOM_AGENTID: ${{ secrets.WECOM_AGENTID }}
          WECOM_TOUSER: ${{ secrets.WECOM_TOUSER }}
          # Server酱
          SCT_KEY: ${{ secrets.SCT_KEY }}
          # WxPusher
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UIDS: ${{ secrets.WXPUSHER_UIDS }}
          # PushPlus
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          echo "Time (UTC): $(date)"
          echo "Time (Shanghai): $(TZ=Asia/Shanghai date)"
          echo "---"
          cd scripts
          if [ "${{ github.event.inputs.test }}" = "true" ]; then
            echo "Test mode: sending test message..."
            TZ=Asia/Shanghai python test_action.py
          else
            TZ=Asia/Shanghai python check_reminders.py
          fi
